<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qwen3 WebGPU - 3D Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- WebGL Canvas -->
      <canvas id="three-canvas"></canvas>
      
      <!-- CSS3D Container -->
      <div id="css3d-container"></div>

      <!-- Loading Screen (remains normal DOM for initial load) -->
      <div id="loading-screen">
        <div class="loader-container">
          <div class="loader"></div>
          <div class="loader-ring"></div>
        </div>
        <p id="loading-text">Initializing WebGPU...</p>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <div id="loading-percentage">0%</div>
      </div>

      <!-- Hidden template for 3D interface -->
      <div id="interface-template" style="display: none;">
        <div class="glass-panel">
          <header>
            <div class="header-main">
              <h1>QWEN<span>3.5</span></h1>
              <div id="status">Initializing...</div>
            </div>
            <div class="chat-actions">
              <button id="clear-btn" title="Clear Chat" class="action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
              </button>
              <button id="copy-btn" title="Copy Chat" class="action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              </button>
              <button id="download-btn" title="Download Chat" class="action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              </button>
            </div>
          </header>

          <div id="chat-container">
            <div id="messages"></div>
          </div>

          <div id="input-area">
            <div class="input-wrapper">
              <textarea id="prompt-input" placeholder="Type a message..." rows="1" autofocus></textarea>
              <button id="send-btn" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M1.946 9.315c-.522-.174-.527-.455.01-.634l19.087-6.362c.529-.176.832.12.684.638l-5.454 19.086c-.15.529-.455.547-.679.045L12 14l6-8-8 6-3.054-2.685z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
